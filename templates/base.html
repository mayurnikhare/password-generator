<!DOCTYPE html>
<html>
<head>
    <title>Password App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    height: 100vh;
    color: white;
}

/* 🔥 Animation */
@keyframes gradientBG {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* Hover glow */
        .btn-glow {
            transition: 0.3s;
        }

        .btn-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255,255,255,0.7);
        }

        .password-text {
    font-family: monospace;
    letter-spacing: 1px;
}
/* 🔥 Premium Light Table */
.custom-table {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    overflow: hidden;
}

/* Table header */
.custom-table thead {
    background: rgba(255, 255, 255, 0.3);
    color: #333;
    font-weight: 600;
}

/* Table rows */
.custom-table tbody tr {
    color: white;
    transition: 0.3s;
}

/* Hover effect */
.custom-table tbody tr:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(1.01);
}

/* 🔥 Center Username Badge */
.user-badge {
    background: rgba(255, 255, 255, 0.2);
    padding: 8px 20px;
    border-radius: 25px;
    backdrop-filter: blur(10px);
    font-weight: 500;
    letter-spacing: 1px;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
    transition: 0.3s;
}

/* Hover effect */
.user-badge:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
}


    </style>
</head>

<body>

<nav class="position-relative py-3">

    <!-- Left: App Name -->
    <div class="position-absolute start-0 ms-3 fw-bold">
        🔐 Password App
    </div>

    <!-- Center: Username -->
    {% if current_user.is_authenticated %}
    <div class="text-center">
        <span class="user-badge">
            👋 {{ current_user.username }}
        </span>
    </div>
    {% endif %}

    <!-- Right: Logout -->
    {% if current_user.is_authenticated %}
    <div class="position-absolute end-0 me-3">
        <a href="/logout" class="btn btn-danger btn-glow">Logout</a>
    </div>
    {% endif %}

</nav>

<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
